# 1. Use "db" instead of "localhost" because we are inside Docker
# 2. Use "consultlink" to match your POSTGRES_DB name
spring.datasource.url=jdbc:postgresql://db:5432/consultlink
spring.datasource.username=postgres
spring.datasource.password=password

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# This helps Spring wait a bit longer for the DB to wake up
spring.datasource.hikari.initialization-fail-timeout=0