<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Login</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="login-card">
            <div class="brand">ConsultLink</div>

            <h1>Welcome back</h1>
            <p class="subtitle">Log in to your account</p>

            <div class="login-box">
                <div class="form-group">
                    <label for="userId">Login ID</label>
                    <input type="text" id="userId" placeholder="Enter your Login ID (CL-1 / CO-1 / AD-1)">
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••">
                        <span class="eye-icon">👁</span>
                    </div>
                </div>

                <button class="login-btn" onclick="login()">Sign In</button>
            </div>

            <div class="divider">
                <span>UNIVERSAL ACCESS</span>
            </div>

            <p class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </p>

            <p id="status" class="status-message"></p>
        </div>

        <div class="security-note">
            <span>🛡 Secure SSL Encryption</span>
            <span>🛡 Data Privacy Guaranteed</span>
        </div>

        <div class="bottom-footer">
            <span>© 2026 ConsultLink. All rights reserved.</span>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Help Center</a>
            </div>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
