<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Request Booking</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')" class="active">Request Booking</button>
        <button onclick="go('/client/booking-history.html')">Booking History</button>
        <button onclick="go('/client/process-payment.html')">Process Payment</button>
        <button onclick="go('/client/payment-history.html')">Payment History</button>
        <button onclick="go('/client/chatbot.html')">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Request Booking</h1>

        <div class="card">
            <label for="service">Select Service</label>
            <select id="service" class="input"></select>

            <label for="consultant">Select Consultant</label>
            <select id="consultant" class="input" onchange="loadAvailability()">
                <option value="">-- Choose a consultant --</option>
            </select>

            <label for="timeSlot">Select Time Slot</label>
            <select id="timeSlot" class="input">
                <option value="">-- Choose a time slot --</option>
            </select>

            <button class="primary-btn" onclick="submitBooking()">Submit Booking Request</button>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    let loadedServices = [];

    guardClient();
    loadServices();
    loadConsultants();

    function guardClient() {
        const role = sessionStorage.getItem("userRole");
        if (role !== "CLIENT" && role !== "Client") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadServices() {
        const serviceSelect = document.getElementById("service");
        const message = document.getElementById("message");

        serviceSelect.innerHTML = `<option value="">-- Choose a service --</option>`;

        try {
            const response = await fetch("/api/services");
            if (!response.ok) {
                message.innerText = "Failed to load services.";
                message.style.color = "red";
                return;
            }

            loadedServices = await response.json();

            loadedServices.forEach(service => {
                const option = document.createElement("option");
                option.value = service.id;
                option.textContent = `${service.name} — ${service.description} — $${Number(service.price).toFixed(2)}`;
                option.dataset.name = service.name;
                option.dataset.price = service.price;
                serviceSelect.appendChild(option);
            });
        } catch (error) {
            console.error("Error loading services:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function loadConsultants() {
        const consultantSelect = document.getElementById("consultant");
        const message = document.getElementById("message");

        consultantSelect.innerHTML = `<option value="">-- Choose a consultant --</option>`;

        try {
            const response = await fetch("/api/users");
            if (!response.ok) {
                message.innerText = "Failed to load consultants.";
                message.style.color = "red";
                return;
            }

            const users = await response.json();

            const consultants = users.filter(u => {
                const role = (u.role || "").toUpperCase();
                return role === "CONSULTANT";
            });

            consultants.forEach(c => {
                const option = document.createElement("option");
                option.value = c.userId || c.userID;
                option.textContent = c.name;
                consultantSelect.appendChild(option);
            });
        } catch (error) {
            console.error("Error loading consultants:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function loadAvailability() {
        const consultantId = document.getElementById("consultant").value;
        const timeSlotSelect = document.getElementById("timeSlot");
        const message = document.getElementById("message");

        timeSlotSelect.innerHTML = `<option value="">-- Choose a time slot --</option>`;

        if (!consultantId) {
            return;
        }

        try {
            const response = await fetch(`/api/availability/consultant/${consultantId}`);

            if (!response.ok) {
                message.innerText = "Failed to load time slots.";
                message.style.color = "red";
                return;
            }

            const slots = await response.json();
            console.log("Loaded slots:", slots);

            if (!slots || slots.length === 0) {
                message.innerText = "No available slots for this consultant.";
                message.style.color = "red";
                return;
            }

            message.innerText = "";

            slots.forEach(slot => {
                const option = document.createElement("option");
                option.value = `${slot.date}T${slot.time}`;
                option.textContent = `${slot.date} ${slot.time}`;
                timeSlotSelect.appendChild(option);
            });
        } catch (error) {
            console.error("Error loading availability:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function submitBooking() {
        const serviceSelect = document.getElementById("service");
        const consultantId = document.getElementById("consultant").value;
        const timeSlot = document.getElementById("timeSlot").value;
        const message = document.getElementById("message");
        const userId = sessionStorage.getItem("userId");

        const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
        const serviceId = serviceSelect.value;
        const serviceName = selectedOption ? selectedOption.dataset.name : "";
        const price = selectedOption ? Number(selectedOption.dataset.price) : 0;

        if (!userId) {
            message.innerText = "No logged-in client found.";
            message.style.color = "red";
            return;
        }

        if (!serviceId || !consultantId || !timeSlot) {
            message.innerText = "Please select a service, consultant, and time slot.";
            message.style.color = "red";
            return;
        }

        const bookingData = {
            bookingID: "BK-" + Date.now(),
            clientUserId: userId,
            consultantUserId: consultantId,
            serviceId: Number(serviceId),
            serviceName: serviceName,
            requestedTime: new Date().toISOString(),
            scheduledTime: timeSlot,
            price: price,
            status: "REQUESTED"
        };

        try {
            const response = await fetch("/api/bookings", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bookingData)
            });

            if (!response.ok) {
                message.innerText = "Failed to submit booking.";
                message.style.color = "red";
                return;
            }

            const savedBooking = await response.json();
            message.innerText = `Booking submitted successfully. Booking ID: ${savedBooking.bookingID}`;
            message.style.color = "green";

            document.getElementById("service").value = "";
            document.getElementById("consultant").value = "";
            document.getElementById("timeSlot").innerHTML = `<option value="">-- Choose a time slot --</option>`;
        } catch (error) {
            console.error("Error creating booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
