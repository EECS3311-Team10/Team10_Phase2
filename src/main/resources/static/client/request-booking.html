<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Request Booking</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')" class="active">Request Booking</button>
        <button onclick="go('/client/booking-history.html')">Booking History</button>
        <button onclick="go('/client/process-payment.html')">Process Payment</button>
        <button onclick="go('/client/payment-history.html')">Payment History</button>
        <button onclick="go('/client/chatbot.html')">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Request Booking</h1>

        <div class="card">
            <label for="service">Select Service</label>
            <select id="service" class="input"></select>

            <label for="consultant">Select Consultant</label>
            <select id="consultant" class="input">
                <option value="">-- Choose a consultant --</option>
                <option value="Sarah Chen">Sarah Chen</option>
                <option value="Marcus Thorne">Marcus Thorne</option>
            </select>

            <label for="timeSlot">Select Time Slot</label>
            <select id="timeSlot" class="input">
                <option value="">-- Choose a time slot --</option>
                <option value="2026-04-05T10:00:00">2026-04-05 10:00 AM</option>
                <option value="2026-04-05T14:00:00">2026-04-05 02:00 PM</option>
                <option value="2026-04-06T11:00:00">2026-04-06 11:00 AM</option>
            </select>

            <button class="primary-btn" onclick="submitBooking()">Submit Booking Request</button>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    let loadedServices = [];

    guardClient();
    loadServices();

    function guardClient() {
        const role = localStorage.getItem("userRole");
        if (role !== "CLIENT" && role !== "Client") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadServices() {
        const serviceSelect = document.getElementById("service");
        const message = document.getElementById("message");

        serviceSelect.innerHTML = `<option value="">-- Choose a service --</option>`;

        try {
            const response = await fetch("/api/services");

            if (!response.ok) {
                message.innerText = "Failed to load services.";
                message.style.color = "red";
                return;
            }

            loadedServices = await response.json();

            loadedServices.forEach(service => {
                const option = document.createElement("option");
                option.value = service.id;
                option.textContent = `${service.name} — ${service.description} — $${service.price.toFixed(2)}`;
                option.dataset.name = service.name;
                option.dataset.price = service.price;
                serviceSelect.appendChild(option);
            });

        } catch (error) {
            console.error("Error loading services:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function submitBooking() {
        const serviceSelect = document.getElementById("service");
        const consultant = document.getElementById("consultant").value;
        const timeSlot = document.getElementById("timeSlot").value;
        const message = document.getElementById("message");
        const userId = localStorage.getItem("userId");

        const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
        const serviceId = serviceSelect.value;
        const serviceName = selectedOption ? selectedOption.dataset.name : "";
        const price = selectedOption ? Number(selectedOption.dataset.price) : 0;

        if (!userId) {
            message.innerText = "No logged-in client found.";
            message.style.color = "red";
            return;
        }

        if (!serviceId || !consultant || !timeSlot) {
            message.innerText = "Please select a service, consultant, and time slot.";
            message.style.color = "red";
            return;
        }

        const bookingData = {
            bookingID: "BK-" + Date.now(),
            clientUserId: userId,
            serviceId: Number(serviceId),
            serviceName: serviceName,
            requestedTime: new Date().toISOString(),
            scheduledTime: timeSlot,
            price: price,
            status: "REQUESTED"
        };

        try {
            const response = await fetch("/api/bookings", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bookingData)
            });

            if (!response.ok) {
                message.innerText = "Failed to submit booking.";
                message.style.color = "red";
                return;
            }

            const savedBooking = await response.json();

            message.innerText = `Booking submitted successfully. Booking ID: ${savedBooking.bookingID}`;
            message.style.color = "green";

            document.getElementById("service").value = "";
            document.getElementById("consultant").value = "";
            document.getElementById("timeSlot").value = "";

        } catch (error) {
            console.error("Error creating booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
