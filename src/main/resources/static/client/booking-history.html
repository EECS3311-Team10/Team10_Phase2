<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Booking History</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')">Request Booking</button>
        <button onclick="go('/client/booking-history.html')" class="active">Booking History</button>
        <button onclick="go('/client/process-payment.html')">Process Payment</button>
        <button onclick="go('/client/payment-history.html')">Payment History</button>
        <button onclick="go('/client/chatbot.html')">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Booking History</h1>
        <div class="card">
            <ul id="bookingList" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardClient();
    loadBookings();

    function guardClient() {
        const role = sessionStorage.getItem("userRole");
        if (role !== "CLIENT" && role !== "Client") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadBookings() {
        const bookingList = document.getElementById("bookingList");
        const message = document.getElementById("message");
        const userId = sessionStorage.getItem("userId");

        bookingList.innerHTML = "";
        message.innerText = "Loading bookings...";

        if (!userId) {
            message.innerText = "No logged-in client found.";
            message.style.color = "red";
            return;
        }

        try {
            const response = await fetch(`/api/bookings/client/${userId}`);

            if (!response.ok) {
                message.innerText = "Failed to load booking history.";
                message.style.color = "red";
                return;
            }

            const bookings = await response.json();

            if (!bookings || bookings.length === 0) {
                message.innerText = "No bookings found.";
                return;
            }

            message.innerText = "";

            bookings.forEach(booking => {
                const li = document.createElement("li");

                let actionButtons = "";

                if (
                    booking.status === "REQUESTED" ||
                    booking.status === "CONFIRMED" ||
                    booking.status === "PENDING_PAYMENT"
                ) {
                    actionButtons += `
                        <br>
                        <button class="primary-btn" style="margin-top:10px;" onclick="cancelBooking(${booking.id})">
                            Cancel Booking
                        </button>
                    `;
                }

                if (booking.status === "PENDING_PAYMENT") {
                    actionButtons += `
                        <button class="primary-btn" style="margin-top:10px; margin-left:10px;" onclick="go('/client/process-payment.html')">
                            Go to Payment
                        </button>
                    `;
                }

                li.innerHTML = `
                    <strong>${booking.serviceName || "Service"}</strong><br>
                    <strong>Booking ID:</strong> ${booking.bookingID}<br>
                    <strong>Time:</strong> ${booking.scheduledTime}<br>
                    <strong>Price:</strong> $${Number(booking.price).toFixed(2)}<br>
                    <strong>Status:</strong> ${booking.status}
                    ${actionButtons}
                `;

                bookingList.appendChild(li);
            });

        } catch (error) {
            console.error("Error loading bookings:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function cancelBooking(bookingId) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/bookings/${bookingId}/cancel`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to cancel booking.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Booking cancelled successfully.";
            message.style.color = "green";
            loadBookings();

        } catch (error) {
            console.error("Error cancelling booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
