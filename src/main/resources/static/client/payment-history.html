<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Payment History</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')">Request Booking</button>
        <button onclick="go('/client/booking-history.html')">Booking History</button>
        <button onclick="go('/client/process-payment.html')">Process Payment</button>
        <button onclick="go('/client/payment-history.html')" class="active">Payment History</button>
        <button onclick="go('/client/policy.html')">Policies</button>
        <button onclick="go('/client/chatbot.html')">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Payment History</h1>
        <div class="card">
            <ul id="paymentList" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardClient();
    loadPayments();

    function guardClient() {
        const role = sessionStorage.getItem("userRole");
        if (!role || role.toUpperCase() !== "CLIENT") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadPayments() {
        const paymentList = document.getElementById("paymentList");
        const message = document.getElementById("message");
        const userId = sessionStorage.getItem("userId");

        paymentList.innerHTML = "";
        message.innerText = "Loading payment history...";

        if (!userId) {
            message.innerText = "No logged-in client found.";
            message.style.color = "red";
            return;
        }

        try {
            const response = await fetch(`/api/payments/client/${userId}`);

            if (!response.ok) {
                message.innerText = "Failed to load payment history.";
                message.style.color = "red";
                return;
            }

            const payments = await response.json();

            if (!payments || payments.length === 0) {
                message.innerText = "No payment history found.";
                return;
            }

            payments.sort((a, b) => new Date(b.paymentDate) - new Date(a.paymentDate));

            message.innerText = "";

            payments.forEach(payment => {
                let color = "black";

                if (payment.status === "PAID") color = "green";
                if (payment.status === "FAILED") color = "red";
                if (payment.status === "PENDING") color = "orange";

                const li = document.createElement("li");

                li.innerHTML = `
                    <strong>Payment ID:</strong> ${payment.paymentID || "N/A"}<br>
                    <strong>Transaction ID:</strong> ${payment.transactionID || "N/A"}<br>
                    <strong>Booking ID:</strong> ${payment.bookingID || "N/A"}<br>
                    <strong>Service:</strong> ${payment.serviceName || "Service"}<br>
                    <strong>Amount:</strong> $${Number(payment.price || 0).toFixed(2)}<br>
                    <strong>Method:</strong> ${payment.method || "N/A"}<br>
                    <strong>Status:</strong>
                    <span style="color:${color}; font-weight:bold;">
                        ${payment.status || "UNKNOWN"}
                    </span><br>
                    <strong>Payment Date:</strong> ${payment.paymentDate ? new Date(payment.paymentDate).toLocaleString() : "N/A"}
                `;

                paymentList.appendChild(li);
            });

        } catch (error) {
            console.error("Error loading payment history:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
