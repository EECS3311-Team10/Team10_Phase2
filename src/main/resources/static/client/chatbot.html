<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - AI Assistant</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')">Request Booking</button>
        <button onclick="go('/client/booking-history.html')">Booking History</button>
        <button onclick="go('/client/process-payment.html')">Process Payment</button>
        <button onclick="go('/client/payment-history.html')">Payment History</button>
        <button onclick="go('/client/chatbot.html')" class="active">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>AI Customer Assistant</h1>

        <div class="card">
            <div id="chatBox" class="dashboard-output">
                <p><strong>Assistant:</strong> Hello! Ask me about bookings, services, payments, or platform policies.</p>
            </div>

            <label for="userQuestion">Your Question</label>
            <input type="text" id="userQuestion" class="input" placeholder="Type your question here...">

            <button class="primary-btn" onclick="sendMessage()">Send</button>
        </div>
    </main>
</div>

<script>


    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function sendMessage() {
        const input = document.getElementById("userQuestion");
        const chatBox = document.getElementById("chatBox");
        const question = input.value.trim();

        if (!question) return;

        // 1. Display User Message
        appendMessage("You", question);
        input.value = "";

        // 2. Add "Thinking..." indicator
        const loadingId = "loading-" + Date.now();
        const loadingMsg = document.createElement("p");
        loadingMsg.id = loadingId;
        loadingMsg.innerHTML = "<strong>Assistant:</strong> <em>Thinking...</em>";
        chatBox.appendChild(loadingMsg);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. Hit your actual Backend API
            const response = await fetch('/api/chatbot/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: question })
            });

            if (!response.ok) throw new Error("Server error");

            const data = await response.json();
            
            // 4. Remove loader and show real response
            document.getElementById(loadingId).remove();
            appendMessage("Assistant", data.response);

        } catch (error) {
            console.error("Error:", error);
            document.getElementById(loadingId).remove();
            appendMessage("Assistant", "Sorry, I'm having trouble connecting to the service right now.");
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const p = document.createElement("p");
        p.innerHTML = `<strong>${sender}:</strong> ${text}`;
        chatBox.appendChild(p);
        
        // Auto-scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Allow "Enter" key to send message
    document.getElementById("userQuestion").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>
</body>
</html>
