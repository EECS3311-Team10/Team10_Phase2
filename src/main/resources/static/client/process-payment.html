<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Process Payment</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/client/client.html')">Dashboard</button>
        <button onclick="go('/client/browse-services.html')">Browse Services</button>
        <button onclick="go('/client/request-booking.html')">Request Booking</button>
        <button onclick="go('/client/booking-history.html')">Booking History</button>
        <button onclick="go('/client/process-payment.html')" class="active">Process Payment</button>
        <button onclick="go('/client/payment-history.html')">Payment History</button>
        <button onclick="go('/client/chatbot.html')">AI Assistant</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Process Payment</h1>

        <div class="card">
            <label for="bookingSelect">Select Booking</label>
            <select id="bookingSelect" class="input"></select>

            <label for="paymentMethod">Select Payment Method</label>
            <select id="paymentMethod" class="input">
                <option value="">-- Choose payment method --</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>

            <button class="primary-btn" onclick="processPayment()">Pay Now</button>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
guardClient();
loadPayableBookings();

function guardClient() {
    const role = localStorage.getItem("userRole");
    if (role !== "CLIENT" && role !== "Client") {
        window.location.href = "/index.html";
    }
}

function go(page) {
    window.location.href = page;
}

function logout() {
    localStorage.clear();
    window.location.href = "/index.html";
}

async function loadPayableBookings() {
    const bookingSelect = document.getElementById("bookingSelect");
    const message = document.getElementById("message");
    const userId = localStorage.getItem("userId");

    bookingSelect.innerHTML = "<option>Loading...</option>";

    try {
        const response = await fetch(`/api/bookings/client/${userId}`);

        if (!response.ok) {
            message.innerText = "Failed to load bookings.";
            return;
        }

        const bookings = await response.json();

        const payableBookings = bookings.filter(
            b => b.status === "PENDING_PAYMENT"
        );

        bookingSelect.innerHTML = "";

        if (payableBookings.length === 0) {
            bookingSelect.innerHTML =
                `<option value="">No payable bookings available</option>`;
            return;
        }

        bookingSelect.innerHTML =
            `<option value="">-- Choose a booking --</option>`;

        payableBookings.forEach(booking => {
            const option = document.createElement("option");
            option.value = booking.id;
            option.textContent =
                `${booking.bookingID} - ${booking.serviceName} - $${booking.price.toFixed(2)}`;
            bookingSelect.appendChild(option);
        });

    } catch (error) {
        console.error(error);
        message.innerText = "Cannot connect to backend.";
    }
}

async function processPayment() {
    const bookingId = document.getElementById("bookingSelect").value;
    const paymentMethod = document.getElementById("paymentMethod").value;
    const message = document.getElementById("message");

    if (!bookingId || !paymentMethod) {
        message.innerText =
            "Please select a booking and a payment method.";
        return;
    }

    try {
        const response = await fetch(
            `/api/bookings/${bookingId}/pay`,
            { method: "PUT" }
        );

        if (!response.ok) {
            message.innerText = "Payment failed.";
            return;
        }

        message.innerText = "Payment successful!";
        message.style.color = "green";

        loadPayableBookings();

    } catch (error) {
        console.error(error);
        message.innerText = "Cannot connect to backend.";
    }
}
</script>

</body>
</html>
