<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConsultLink - Sign Up</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="page-wrapper">
<div class="login-card">

<div class="brand">ConsultLink</div>

<h1>Create Account</h1>
<p class="subtitle">Register a new account</p>

<div class="login-box">

<div class="form-group">
<label>User ID</label>
<input type="text" id="userId" placeholder="CL-100 / CO-100">
</div>

<div class="form-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
</div>

<div class="form-group">
<label>Role</label>
<select id="role">
<option value="CLIENT">Client</option>
<option value="CONSULTANT">Consultant</option>
</select>
</div>

<button class="login-btn" onclick="register()">Register</button>

<p id="status" class="status-message"></p>

</div>

<p class="signup-text">
Already have an account? <a href="/index.html">Login</a>
</p>

</div>
</div>

<script>

async function register() {

const status = document.getElementById("status");

const user = {
userId: document.getElementById("userId").value,
name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
password: document.getElementById("password").value,
role: document.getElementById("role").value
};

if(!user.userId || !user.name || !user.password){
status.innerText = "Please fill required fields";
return;
}

try{

const response = await fetch("/api/users/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(user)
});

if(response.ok){
status.innerText = "Registration successful. You can login now.";
status.style.color = "green";
}else{
status.innerText = "Registration failed";
status.style.color = "red";
}

}catch(error){
status.innerText = "Cannot connect to server";
status.style.color = "red";
}

}

</script>

</body>
</html>
