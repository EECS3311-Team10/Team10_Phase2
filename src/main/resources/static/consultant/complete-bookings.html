<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Complete Bookings</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar consultant-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/consultant/consultant.html')">Dashboard</button>
        <button onclick="go('/consultant/manage-availability.html')">Manage Availability</button>
        <button onclick="go('/consultant/review-booking-requests.html')">Review Requests</button>
        <button onclick="go('/consultant/complete-bookings.html')" class="active">Complete Bookings</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Complete Bookings</h1>

        <div class="card">
            <ul id="completeList" class="simple-list"></ul>
        </div>
    </main>
</div>

<script>
    guardConsultant();
    loadPaidBookings();

    function guardConsultant() {
        if (localStorage.getItem("userRole") !== "Consultant") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    function loadPaidBookings() {
        const list = document.getElementById("completeList");
        const consultant = localStorage.getItem("userId") || "ConsultantUser";
        const bookings = JSON.parse(localStorage.getItem("bookings")) || [];

        const paidBookings = bookings.filter(
            b => b.status === "Paid" && b.consultant === consultant
        );

        if (paidBookings.length === 0) {
            list.innerHTML = "<li>No paid bookings to complete.</li>";
            return;
        }

        list.innerHTML = "";

        paidBookings.forEach(booking => {
            const li = document.createElement("li");

            li.innerHTML = `
                <strong>${booking.service}</strong><br>
                Booking ID: ${booking.bookingId}<br>
                Client: ${booking.client}<br>
                Time: ${booking.timeSlot}<br>
                Price: $${booking.price}.00<br>
                Status: ${booking.status}<br><br>

                <button class="primary-btn" 
                        onclick="completeBooking('${booking.bookingId}')">
                    Mark Completed
                </button>
            `;

            list.appendChild(li);
        });
    }

    function completeBooking(bookingId) {
        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

        bookings = bookings.map(b => {
            if (b.bookingId === bookingId) {
                b.status = "Completed";
            }
            return b;
        });

        localStorage.setItem("bookings", JSON.stringify(bookings));
        loadPaidBookings();
    }
</script>
</body>
</html>
