<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Complete Bookings</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar consultant-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/consultant/consultant.html')">Dashboard</button>
        <button onclick="go('/consultant/manage-availability.html')">Manage Availability</button>
        <button onclick="go('/consultant/review-booking-requests.html')">Review Requests</button>
        <button onclick="go('/consultant/complete-bookings.html')" class="active">Complete Bookings</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Complete Bookings</h1>

        <div class="card">
            <ul id="completeList" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardConsultant();
    loadPaidBookings();

    function guardConsultant() {
        const role = sessionStorage.getItem("userRole");
        if (role !== "CONSULTANT" && role !== "Consultant") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadPaidBookings() {
        const list = document.getElementById("completeList");
        const message = document.getElementById("message");

        list.innerHTML = "";
        message.innerText = "Loading paid bookings...";

        try {
            const response = await fetch("/api/bookings");

            if (!response.ok) {
                message.innerText = "Failed to load bookings.";
                message.style.color = "red";
                return;
            }

            const bookings = await response.json();

            const paidBookings = bookings.filter(
                b => b.status === "PAID"
            );

            if (paidBookings.length === 0) {
                message.innerText = "No paid bookings to complete.";
                return;
            }

            message.innerText = "";

            paidBookings.forEach(booking => {
                const li = document.createElement("li");

                li.innerHTML = `
                    <strong>${booking.serviceName || "Service"}</strong><br>
                    <strong>Booking ID:</strong> ${booking.bookingID}<br>
                    <strong>Client:</strong> ${booking.clientUserId}<br>
                    <strong>Time:</strong> ${booking.scheduledTime}<br>
                    <strong>Price:</strong> $${Number(booking.price).toFixed(2)}<br>
                    <strong>Status:</strong> ${booking.status}<br><br>

                    <button class="primary-btn" onclick="completeBooking(${booking.id})">
                        Mark Completed
                    </button>
                `;

                list.appendChild(li);
            });

        } catch (error) {
            console.error("Error loading paid bookings:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function completeBooking(bookingId) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/bookings/${bookingId}/complete`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to complete booking.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Booking marked as completed.";
            message.style.color = "green";
            loadPaidBookings();

        } catch (error) {
            console.error("Error completing booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
