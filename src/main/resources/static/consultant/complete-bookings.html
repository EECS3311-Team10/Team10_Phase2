<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Availability</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
<div class="layout">

<aside class="sidebar consultant-sidebar">
<h2>ConsultLink</h2>

<button onclick="go('/consultant/consultant.html')" class="active">Dashboard</button>
<button onclick="go('/consultant/manage-availability.html')">Manage Availability</button>
<button onclick="go('/consultant/review-booking-requests.html')">Accept / Reject Booking</button>
<button onclick="go('/consultant/complete-bookings.html')">Complete Booking</button>
<button onclick="logout()">Logout</button>

</aside>

<main class="content">
<h1>Manage Availability</h1>

<div class="card">
<label>Date</label>
<input class="input" type="date">

<label>Time</label>
<input class="input" type="time">

<button class="primary-btn">Add Availability</button>
</div>

</main>
</div>

<script>
function go(page){ window.location.href = page; }
function logout(){ localStorage.clear(); window.location.href="/index.html"; }
</script>

</body>
</html>
