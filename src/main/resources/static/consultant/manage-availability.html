<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Manage Availability</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar consultant-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/consultant/consultant.html')">Dashboard</button>
        <button onclick="go('/consultant/manage-availability.html')" class="active">Manage Availability</button>
        <button onclick="go('/consultant/review-booking-requests.html')">Review Requests</button>
        <button onclick="go('/consultant/complete-bookings.html')">Complete Bookings</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Manage Availability</h1>

        <div class="card">
            <h3>Add Time Slot</h3>

            <label>Date</label>
            <input type="date" id="date" class="input">

            <label>Time</label>
            <input type="time" id="time" class="input">

            <button class="primary-btn" onclick="addSlot()">Add Slot</button>

            <p id="message" class="page-message"></p>
        </div>

        <div class="card">
            <h3>Available Slots</h3>
            <ul id="slotList" class="simple-list"></ul>
        </div>
    </main>
</div>

<script>

loadSlots();

function go(page) {
    window.location.href = page;
}

function logout() {
    sessionStorage.clear();
    window.location.href = "/index.html";
}

async function addSlot() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const message = document.getElementById("message");

    if (!date || !time) {
        message.innerText = "Please select date and time.";
        return;
    }

    const consultantUserId = sessionStorage.getItem("userId");

    try {
        await fetch("/api/availability", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                consultantUserId: consultantUserId,
                date: date,
                time: time
            })
        });

        message.innerText = "Time slot added.";
        loadSlots();

    } catch (error) {
        console.error(error);
        message.innerText = "Error adding slot.";
    }
}

async function loadSlots() {
    const slotList = document.getElementById("slotList");
    const consultantUserId = sessionStorage.getItem("userId");

    try {
        const response = await fetch(
            `/api/availability/consultant/${consultantUserId}`
        );

        const slots = await response.json();

        if (slots.length === 0) {
            slotList.innerHTML = "<li>No slots added.</li>";
            return;
        }

        slotList.innerHTML = "";

        slots.forEach(slot => {
            const li = document.createElement("li");

            li.innerHTML = `
                ${slot.date} - ${slot.time}
                <button class="primary-btn"
                        style="margin-left:10px;"
                        onclick="removeSlot(${slot.id})">
                        Remove
                </button>
            `;

            slotList.appendChild(li);
        });

    } catch (error) {
        console.error(error);
    }
}

async function removeSlot(id) {
    await fetch(`/api/availability/${id}`, {
        method: "DELETE"
    });

    loadSlots();
}

</script>
</body>
</html>
