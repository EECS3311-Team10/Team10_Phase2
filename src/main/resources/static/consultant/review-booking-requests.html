<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Booking Requests</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar consultant-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/consultant/consultant.html')">Dashboard</button>
        <button onclick="go('/consultant/manage-availability.html')">Manage Availability</button>
        <button onclick="go('/consultant/review-booking-requests.html')" class="active">Review Requests</button>
        <button onclick="go('/consultant/complete-bookings.html')">Complete Bookings</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Booking Requests</h1>

        <div class="card">
            <ul id="requestList" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardConsultant();
    loadRequests();

    function guardConsultant() {
        const role = sessionStorage.getItem("userRole");
        if (role !== "CONSULTANT" && role !== "Consultant") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadRequests() {
        const requestList = document.getElementById("requestList");
        const message = document.getElementById("message");

        requestList.innerHTML = "";
        message.innerText = "Loading requests...";

        try {
            const response = await fetch("/api/bookings");

            if (!response.ok) {
                message.innerText = "Failed to load booking requests.";
                message.style.color = "red";
                return;
            }

            const bookings = await response.json();

            const requestedBookings = bookings.filter(
                booking => booking.status === "REQUESTED"
            );

            if (requestedBookings.length === 0) {
                message.innerText = "No booking requests found.";
                return;
            }

            message.innerText = "";

            requestedBookings.forEach(booking => {
                const li = document.createElement("li");

                li.innerHTML = `
                    <strong>${booking.serviceName || "Service"}</strong><br>
                    <strong>Booking ID:</strong> ${booking.bookingID}<br>
                    <strong>Client:</strong> ${booking.clientUserId}<br>
                    <strong>Time:</strong> ${booking.scheduledTime}<br>
                    <strong>Price:</strong> $${Number(booking.price).toFixed(2)}<br>
                    <strong>Status:</strong> ${booking.status}<br><br>

                    <button class="primary-btn" onclick="acceptBooking(${booking.id})">
                        Accept
                    </button>

                    <button class="primary-btn" style="margin-left:10px;" onclick="rejectBooking(${booking.id})">
                        Reject
                    </button>
                `;

                requestList.appendChild(li);
            });

        } catch (error) {
            console.error("Error loading booking requests:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function acceptBooking(bookingId) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/bookings/${bookingId}/confirm`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to accept booking.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Booking accepted.";
            message.style.color = "green";
            loadRequests();

        } catch (error) {
            console.error("Error accepting booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function rejectBooking(bookingId) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/bookings/${bookingId}/reject`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to reject booking.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Booking rejected.";
            message.style.color = "green";
            loadRequests();

        } catch (error) {
            console.error("Error rejecting booking:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
