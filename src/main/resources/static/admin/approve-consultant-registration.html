<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Approve Consultants</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar admin-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/admin/admin.html')">Dashboard</button>
        <button onclick="go('/admin/approve-consultant-registration.html')" class="active">Approve Consultants</button>
        <button onclick="go('/admin/manage-policies.html')">Manage Policies</button>
        <button onclick="go('/admin/system-status.html')">System Status</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Approve Consultants</h1>

        <div class="card">
            <ul id="consultantList" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardAdmin();
    loadConsultants();

    function guardAdmin() {
        const role = localStorage.getItem("userRole");
        if (role !== "ADMIN" && role !== "Admin") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadConsultants() {
        const consultantList = document.getElementById("consultantList");
        const message = document.getElementById("message");

        consultantList.innerHTML = "";
        message.innerText = "Loading consultants...";

        try {
            const response = await fetch("/api/users");

            if (!response.ok) {
                message.innerText = "Failed to load consultants.";
                message.style.color = "red";
                return;
            }

            const users = await response.json();

            const consultants = users.filter(user =>
                (user.role === "CONSULTANT" || user.role === "Consultant")
            );

            const pendingConsultants = consultants.filter(c =>
                (c.approved === false) ||
                (c.isApproved === false) ||
                (c.approved === undefined && c.isApproved === undefined)
            );

            if (pendingConsultants.length === 0) {
                message.innerText = "No pending consultant approvals.";
                return;
            }

            message.innerText = "";

            pendingConsultants.forEach(consultant => {
                const approvedValue =
                    consultant.approved !== undefined
                        ? consultant.approved
                        : consultant.isApproved;

                const li = document.createElement("li");
                li.innerHTML = `
                    <strong>${consultant.name}</strong><br>
                    <strong>Consultant ID:</strong> ${consultant.userId || consultant.userID}<br>
                    <strong>Email:</strong> ${consultant.email}<br>
                    <strong>Phone:</strong> ${consultant.phone || "N/A"}<br>
                    <strong>Status:</strong> ${approvedValue ? "Approved" : "Pending"}<br><br>

                    <button class="primary-btn" onclick="approveConsultant(${consultant.id})">
                        Approve
                    </button>

                    <button class="primary-btn" style="margin-left:10px;" onclick="rejectConsultant(${consultant.id})">
                        Reject
                    </button>
                `;

                consultantList.appendChild(li);
            });

        } catch (error) {
            console.error("Error loading consultants:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function approveConsultant(id) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/users/consultants/${id}/approve`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to approve consultant.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Consultant approved.";
            message.style.color = "green";
            loadConsultants();

        } catch (error) {
            console.error("Error approving consultant:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function rejectConsultant(id) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`/api/users/consultants/${id}/reject`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to reject consultant.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Consultant rejected.";
            message.style.color = "green";
            loadConsultants();

        } catch (error) {
            console.error("Error rejecting consultant:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
