<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - Manage Policies</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar admin-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/admin/admin.html')">Dashboard</button>
        <button onclick="go('/admin/approve-consultant-registration.html')">Approve Consultants</button>
        <button onclick="go('/admin/manage-policies.html')" class="active">Manage Policies</button>
        <button onclick="go('/admin/system-status.html')">System Status</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>Manage Policies</h1>

        <div class="card">

            <label for="cancellationRule">Cancellation Rule</label>
            <input type="text" id="cancellationRule" class="input"
                placeholder="Example: 24-hour notice required">

            <label for="refundPolicy">Refund Policy</label>
            <input type="text" id="refundPolicy" class="input"
                placeholder="Example: Full refund before 24 hours">

            <label for="notificationSetting">Notification Setting</label>
            <select id="notificationSetting" class="input">
                <option value="Email notifications enabled">Email notifications enabled</option>
                <option value="SMS notifications enabled">SMS notifications enabled</option>
                <option value="Notifications disabled">Notifications disabled</option>
            </select>

            <label for="pricingStrategy">Pricing Strategy</label>
            <select id="pricingStrategy" class="input">
                <option value="Standard pricing">Standard pricing</option>
                <option value="Discount pricing">Discount pricing</option>
            </select>

            <button class="primary-btn" onclick="savePolicies()">Save Policies</button>
            <p id="message" class="page-message"></p>

        </div>
    </main>
</div>

<script>
    guardAdmin();
    loadPolicies();

    function guardAdmin() {
        const role = sessionStorage.getItem("userRole");
        if (!role || role.toUpperCase() !== "ADMIN") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadPolicies() {
        const message = document.getElementById("message");

        try {
            const response = await fetch("/api/policies");

            if (!response.ok) {
                message.innerText = "Failed to load policies.";
                message.style.color = "red";
                return;
            }

            const policies = await response.json();

            document.getElementById("cancellationRule").value = policies.cancellationRule;
            document.getElementById("refundPolicy").value = policies.refundPolicy;
            document.getElementById("notificationSetting").value = policies.notificationSetting;
            document.getElementById("pricingStrategy").value = policies.pricingStrategy;

            message.innerText = "";
        } catch (error) {
            console.error("Error loading policies:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    async function savePolicies() {
        const message = document.getElementById("message");

        const policies = {
            cancellationRule: document.getElementById("cancellationRule").value,
            refundPolicy: document.getElementById("refundPolicy").value,
            notificationSetting: document.getElementById("notificationSetting").value,
            pricingStrategy: document.getElementById("pricingStrategy").value
        };

        try {
            const response = await fetch("/api/policies", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(policies)
            });

            if (!response.ok) {
                message.innerText = "Failed to save policies.";
                message.style.color = "red";
                return;
            }

            message.innerText = "Policies saved successfully.";
            message.style.color = "green";
        } catch (error) {
            console.error("Error saving policies:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }
</script>
</body>
</html>
