<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink - System Status</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar admin-sidebar">
        <h2>ConsultLink</h2>
        <button onclick="go('/admin/admin.html')">Dashboard</button>
        <button onclick="go('/admin/approve-consultant-registration.html')">Approve Consultants</button>
        <button onclick="go('/admin/manage-policies.html')">Manage Policies</button>
        <button onclick="go('/admin/system-status.html')" class="active">System Status</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <main class="content">
        <h1>System Status</h1>

        <div class="card-grid">
            <div class="mini-card">
                <h4>Total Bookings</h4>
                <p id="totalBookings">0</p>
            </div>

            <div class="mini-card">
                <h4>Total Payments</h4>
                <p id="totalPayments">0</p>
            </div>

            <div class="mini-card">
                <h4>Total Consultants</h4>
                <p id="totalConsultants">0</p>
            </div>

            <div class="mini-card">
                <h4>Approved Consultants</h4>
                <p id="approvedConsultants">0</p>
            </div>
        </div>

        <div class="card">
            <h3>Booking Status Summary</h3>
            <ul id="statusSummary" class="simple-list"></ul>
            <p id="message" class="page-message"></p>
        </div>
    </main>
</div>

<script>
    guardAdmin();
    loadSystemStatus();

    function guardAdmin() {
        const role = localStorage.getItem("userRole");
        if (role !== "ADMIN" && role !== "Admin") {
            window.location.href = "/index.html";
        }
    }

    function go(page) {
        window.location.href = page;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    async function loadSystemStatus() {
        const message = document.getElementById("message");

        try {
            const [bookingResponse, userResponse] = await Promise.all([
                fetch("/api/bookings"),
                fetch("/api/users")
            ]);

            if (!bookingResponse.ok || !userResponse.ok) {
                message.innerText = "Failed to load system status.";
                message.style.color = "red";
                return;
            }

            const bookings = await bookingResponse.json();
            const users = await userResponse.json();

            const consultants = users.filter(user =>
                user.role === "CONSULTANT" || user.role === "Consultant"
            );

            const approvedConsultants = consultants.filter(c =>
                c.approved === true || c.isApproved === true
            );

            const paymentLikeBookings = bookings.filter(b =>
                b.status === "PAID" || b.status === "COMPLETED"
            );

            document.getElementById("totalBookings").innerText = bookings.length;
            document.getElementById("totalPayments").innerText = paymentLikeBookings.length;
            document.getElementById("totalConsultants").innerText = consultants.length;
            document.getElementById("approvedConsultants").innerText = approvedConsultants.length;

            const counts = {
                REQUESTED: 0,
                PENDING_PAYMENT: 0,
                PAID: 0,
                COMPLETED: 0,
                CANCELLED: 0,
                REJECTED: 0
            };

            bookings.forEach(booking => {
                if (counts.hasOwnProperty(booking.status)) {
                    counts[booking.status]++;
                }
            });

            const statusSummary = document.getElementById("statusSummary");
            statusSummary.innerHTML = "";

            Object.keys(counts).forEach(status => {
                const li = document.createElement("li");
                li.innerHTML = `<strong>${formatStatus(status)}:</strong> ${counts[status]}`;
                statusSummary.appendChild(li);
            });

            message.innerText = "";

        } catch (error) {
            console.error("Error loading system status:", error);
            message.innerText = "Cannot connect to backend.";
            message.style.color = "red";
        }
    }

    function formatStatus(status) {
        return status
            .toLowerCase()
            .split("_")
            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
            .join(" ");
    }
</script>
</body>
</html>
